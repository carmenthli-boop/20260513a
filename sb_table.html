<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Table</title>
  <link rel="stylesheet" href="style.css">
  <style>
    table {
      width: 600px;
      border: orange solid 1px;
      border-collapse: collapse;
      /* border-spacing: 0px; */
      margin: auto;
    }

    th,
    td {
      width: 200px;
      border: orange solid 1px;
      padding: 10px;
    }

    caption {
      padding: 10px;
      font-size: medium;
    }
  </style>
</head>

<body>
  <h1>Time Table</h1>
  <hr>

        </tr>
        <tr>
          <td>A4347</td>

      </table>
</body>

</html>
